version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ar_menu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/ar_menu?schema=public
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-me-in-production}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://${API_DOMAIN}/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-admin.localhost}
      - API_DOMAIN=${API_DOMAIN:-api.localhost}
    depends_on:
      - admin-dashboard
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
